name: Build Windows Artifacts

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

env:
  BUN_VERSION: 1.3.9
  FREESWITCH_VERSION: 1.10.12
  FREESWITCH_MSI_URL: http://files.freeswitch.org/windows/installer/x64/FreeSWITCH-1.10.12-Release-x64.msi
  FFMPEG_ZIP_URL: https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip
  MOSQUITTO_INSTALLER_URL: https://mosquitto.org/files/binary/win64/mosquitto-2.1.2-install-windows-x64.exe
  WINSW_URL: https://github.com/winsw/winsw/releases/download/v2.12.0/WinSW-x64.exe
  POSTGRES_INSTALLER_URL: https://get.enterprisedb.com/postgresql/postgresql-16.13-3-windows-x64.exe
  APP_VERSION: 0.1.0-manual

jobs:
  build-windows:
    name: Build Windows executables
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve app version
        id: version
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = "${env:APP_VERSION}"
          if ("${env:GITHUB_REF_TYPE}" -eq "tag") {
            $version = "${env:GITHUB_REF_NAME}" -replace '^v', ''
            "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }
          "app_version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Installer version: $version"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check types
        run: bun run check-types

      - name: Build server executable
        run: bun run --cwd apps/server compile

      - name: Build ingest executable
        run: bun run --cwd apps/ingest build

      - name: Build multicast agent executable
        run: bun run --cwd apps/multicast-agent build

      - name: Build desktop application
        run: bun run build:desktop

      - name: Stage full Windows bundle
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          .\ops\windows\scripts\stage-bundle.ps1 `
            -FreeSwitchVersion "${env:FREESWITCH_VERSION}" `
            -FreeSwitchMsiUrl "${env:FREESWITCH_MSI_URL}" `
            -FfmpegZipUrl "${env:FFMPEG_ZIP_URL}" `
            -MosquittoInstallerUrl "${env:MOSQUITTO_INSTALLER_URL}" `
            -WinSWUrl "${env:WINSW_URL}" `
            -PostgresInstallerUrl "${env:POSTGRES_INSTALLER_URL}"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Compile Windows installer
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $iscc = Get-ChildItem "${env:ProgramFiles(x86)}\Inno Setup*\ISCC.exe" -ErrorAction SilentlyContinue |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if ($null -eq $iscc) {
            throw "ISCC.exe was not found after installing Inno Setup."
          }
          & $iscc.FullName "/DAppVersion=${env:APP_VERSION}" "ops\windows\installer\khomp-stack.iss"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: stack-pbx-windows-${{ steps.version.outputs.app_version }}
          path: |
            dist/windows/installer/*.exe
            dist/windows/bundle
          if-no-files-found: error

      - name: Publish GitHub release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: Khomp Stack ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: dist/windows/installer/*.exe
          generate_release_notes: true
