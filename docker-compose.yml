name: stack-pbx

x-bun-app: &bun-app
  restart: unless-stopped

services:
  postgres:
    image: postgres:latest
    container_name: stack-pbx-postgres
    environment:
      POSTGRES_DB: stack-pbx
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - stack-pbx_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  emqx:
    image: emqx/emqx:latest
    container_name: stack-pbx-emqx
    hostname: emqx
    entrypoint: ["/bin/sh", "/opt/emqx/bin/bootstrap-auth.sh"]
    ports:
      - "1883:1883"
      - "8083:8083"
      - "8084:8084"
      - "8883:8883"
      - "18083:18083"
    environment:
      EMQX_NAME: stack-pbx-emqx
      EMQX_HOST: emqx
      MQTT_BROKER_USERNAME: ${MQTT_BROKER_USERNAME:-}
      MQTT_BROKER_PASSWORD: ${MQTT_BROKER_PASSWORD:-}
    volumes:
      - ./infra/emqx/bootstrap-auth.sh:/opt/emqx/bin/bootstrap-auth.sh:ro
      - stack-pbx_emqx_data:/opt/emqx/data
      - stack-pbx_emqx_log:/opt/emqx/log
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  asterisk:
    image: andrius/asterisk:22
    container_name: stack-pbx-asterisk
    command:
      [
        "/bin/sh",
        "-lc",
        "/bootstrap-generated.sh && exec /usr/sbin/asterisk -vvvdddf -T -W -U asterisk -p",
      ]
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
      - SYS_RESOURCE
    ports:
      - "5038:5038"
      - "5060:5060/tcp"
      - "5060:5060/udp"
      - "8088:8088"
      - "10000-10100:10000-10100/udp"
    volumes:
      - ./infra/asterisk/config/asterisk.conf:/etc/asterisk/asterisk.conf:ro
      - ./infra/asterisk/config/extensions.conf:/etc/asterisk/extensions.conf:ro
      - ./infra/asterisk/config/http.conf:/etc/asterisk/http.conf:ro
      - ./infra/asterisk/config/logger.conf:/etc/asterisk/logger.conf:ro
      - ./infra/asterisk/config/manager.conf:/etc/asterisk/manager.conf:ro
      - ./infra/asterisk/config/modules.conf:/etc/asterisk/modules.conf:ro
      - ./infra/asterisk/config/pjsip.conf:/etc/asterisk/pjsip.conf:ro
      - ./infra/asterisk/config/rtp.conf:/etc/asterisk/rtp.conf:ro
      - ./infra/asterisk/generated:/etc/asterisk/generated
      - ./infra/asterisk/scripts/bootstrap-generated.sh:/bootstrap-generated.sh:ro
      - stack-pbx_asterisk_data:/var/lib/asterisk
      - ./infra/asterisk/log:/var/log/asterisk
      - ./infra/asterisk/spool:/var/spool/asterisk
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "asterisk", "-rx", "core show uptime seconds"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  server:
    <<: *bun-app
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: stack-pbx-server
    working_dir: /app
    command: ["bun", "run", "--cwd", "apps/server", "start:docker"]
    env_file:
      - ./.env
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: ${DOCKER_DATABASE_URL}
      MQTT_BROKER_HOST: ${DOCKER_MQTT_BROKER_HOST}
      ASTERISK_AMI_HOST: ${DOCKER_ASTERISK_AMI_HOST:-asterisk}
      ASTERISK_GENERATED_PJSIP_DIR: ${DOCKER_ASTERISK_GENERATED_PJSIP_DIR}
      ASTERISK_GENERATED_EXTENSIONS_DIR: ${DOCKER_ASTERISK_GENERATED_EXTENSIONS_DIR}
    volumes:
      - ./infra/asterisk/generated:/app/infra/asterisk/generated
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      emqx:
        condition: service_started
      asterisk:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "const response = await fetch('http://127.0.0.1:3000/'); if (!response.ok) process.exit(1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  ingest:
    <<: *bun-app
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stack-pbx-ingest
    working_dir: /app
    command: ["bun", "run", "--cwd", "apps/ingest", "start"]
    env_file:
      - ./.env
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL}
      INTERNAL_SERVER_URL: ${DOCKER_INTERNAL_SERVER_URL:-http://server:3000}
      MQTT_BROKER_HOST: ${DOCKER_MQTT_BROKER_HOST}
    depends_on:
      postgres:
        condition: service_healthy
      emqx:
        condition: service_started
      server:
        condition: service_healthy

  web:
    <<: *bun-app
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stack-pbx-web
    working_dir: /app
    command: ["bun", "run", "--cwd", "apps/web", "dev", "--", "--host", "0.0.0.0", "--port", "3001"]
    env_file:
      - ./.env
    ports:
      - "3001:3001"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "const response = await fetch('http://127.0.0.1:3001/'); if (!response.ok) process.exit(1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  stack-pbx_postgres_data:
  stack-pbx_asterisk_data:
  stack-pbx_emqx_data:
  stack-pbx_emqx_log:
