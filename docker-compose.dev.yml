services:
  server:
    network_mode: host
    command: ["bun", "run", "--cwd", "apps/server", "dev:docker"]
    environment:
      DATABASE_URL: ${DEV_DATABASE_URL}
      MQTT_BROKER_HOST: ${DEV_MQTT_BROKER_HOST}
      ASTERISK_AMI_HOST: ${DEV_ASTERISK_AMI_HOST}
    volumes:
      - ./apps/server:/app/apps/server
      - ./packages:/app/packages
      - ./package.json:/app/package.json:ro
      - ./tsconfig.json:/app/tsconfig.json:ro
      - ./infra/asterisk/generated:/app/infra/asterisk/generated

  ingest:
    command: ["bun", "run", "--cwd", "apps/ingest", "dev"]
    environment:
      INTERNAL_SERVER_URL: ${DEV_INTERNAL_SERVER_URL}
    volumes:
      - ./apps/ingest:/app/apps/ingest
      - ./packages:/app/packages
      - ./package.json:/app/package.json:ro
      - ./tsconfig.json:/app/tsconfig.json:ro

  web:
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - ./package.json:/app/package.json:ro
      - ./tsconfig.json:/app/tsconfig.json:ro
